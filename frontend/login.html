<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing - Upload Files</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .upload-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
        }
        .upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }
        .upload-area:hover {
            border-color: #667eea;
        }
        .file-icon {
            font-size: 3rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="upload-container">
                    <div class="text-center mb-4">
                        <h2 class="text-primary">File Sharing</h2>
                        <p class="text-muted">Upload and share your files instantly</p>
                    </div>
                    
                    <div id="alertContainer"></div>
                    
                    <div class="upload-area" id="uploadArea">
                        <div class="file-icon">📁</div>
                        <h5>Drop files here or click to browse</h5>
                        <p class="text-muted mb-0">Maximum file size: 50MB</p>
                    </div>
                    
                    <form id="uploadForm">
                        <div class="mb-3">
                            <input type="file" class="form-control" id="fileInput" name="file" multiple>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Upload Files</button>
                        </div>
                        
                        <div class="text-center">
                            <p class="mb-0">View uploaded files: 
                                <a href="dashboard.html" class="text-primary text-decoration-none">Go to Dashboard</a>
                            </p>
                        </div>
                    </form>
                    
                    <!-- Upload progress -->
                    <div id="uploadProgress" style="display: none;">
                        <div class="progress mb-3">
                            <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <p class="text-center text-muted" id="progressText">Uploading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_BASE_URL = 'http://localhost:8000';
        
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
        
        // Drag and drop functionality
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#dee2e6';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#dee2e6';
            fileInput.files = e.dataTransfer.files;
            updateFileList();
        });
        
        fileInput.addEventListener('change', updateFileList);
        
        function updateFileList() {
            const files = fileInput.files;
            if (files.length > 0) {
                let fileList = '';
                for (let i = 0; i < files.length; i++) {
                    fileList += files[i].name + '<br>';
                }
                uploadArea.innerHTML = `
                    <div class="file-icon">📄</div>
                    <h6>Selected Files:</h6>
                    <div class="text-start">${fileList}</div>
                `;
            }
        }
        
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const files = fileInput.files;
            if (files.length === 0) {
                showAlert('Please select at least one file to upload.');
                return;
            }
            
            const uploadProgress = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            
            uploadProgress.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const formData = new FormData();
                formData.append('file', file);
                
                progressText.textContent = `Uploading ${file.name}... (${i + 1}/${files.length})`;
                progressBar.style.width = `${(i / files.length) * 100}%`;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/files/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        console.log(`File ${file.name} uploaded successfully`);
                    } else {
                        throw new Error(data.message || `Failed to upload ${file.name}`);
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    showAlert(`Failed to upload ${file.name}: ${error.message}`);
                    uploadProgress.style.display = 'none';
                    return;
                }
            }
            
            // All files uploaded successfully
            progressBar.style.width = '100%';
            progressText.textContent = 'Upload completed!';
            
            showAlert(`Successfully uploaded ${files.length} file(s)!`, 'success');
            
            // Reset form after 2 seconds
            setTimeout(() => {
                fileInput.value = '';
                uploadProgress.style.display = 'none';
                uploadArea.innerHTML = `
                    <div class="file-icon">📁</div>
                    <h5>Drop files here or click to browse</h5>
                    <p class="text-muted mb-0">Maximum file size: 50MB</p>
                `;
            }, 2000);
        });
    </script>
</body>
</html>
